name: Bug Report
description: Report a bug in the system
title: "[Bug]: "
labels: ["bug"]
projects: ["DUNE-DAQ/5"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Give a clear and concise description of the bug, included what you expected to happen and what the actual behavior was.
      placeholder: "What happened?"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Give a clear set of steps to reproduce the error or how you saw the error.
      placeholder: |
        1. Go to...
        1. Setup...
        1. Run...
        1. See error...
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: Version and environment
      description: Give the dunedaq version and environment in which you saw the error
      placeholder: "[e.g., 'fddaq-v5.4.1, ProtoDUNE-VD' or 'NFD_DEV_251023_A9, regression tests']"
    validations:
      required: true
  - type: dropdown
    id: impact-radius
    attributes:
      label: Impact
      description: |
        What do you think this bug's "impact radius" is?
          - _Small/Isolated_: Affects one repo/one subsystem
          - _Medium_: Affects multiple repos and/or multiple functionalities within one subsystem
          - _Large_: Affects many repos and/or core underlying functionality of many parts of DUNE DAQ
      options:
        - Small/Isolated
        - Medium
        - Large
        - ???
      default: 0
    validations:
       required: true
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false        
